global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "gateway"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["gateway:8000"]

  - job_name: "auth-service"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["auth-service:8000"]

  - job_name: "item-service"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["item-service:8000"]

  - job_name: "matching-service"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["matching-service:8000"]

  - job_name: "recovery-case-service"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["recovery-case-service:8000"]
